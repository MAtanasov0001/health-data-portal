# Локална среда за разработка/демо (режим B). НЕ за продукция.
# Вдига: CKAN (вариант А) + неговите зависимости, публичното API и frontend-а.
# Тайните тук са ЗАМЕСТИТЕЛИ за локална употреба — никога не са реални (виж .env.example).

name: ohdp

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${DB_USER:-ckan}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-changeme-local-only}
      POSTGRES_DB: ${DB_NAME:-ckan}
    volumes:
      - db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-ckan}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  solr:
    image: ckan/ckan-solr:2.10-solr9
    volumes:
      - solr-data:/var/solr

  ckan:
    # Каталожно ядро (вариант А): CKAN + ckanext-dcat (DCAT-AP / харвест).
    build:
      context: ../catalog/ckan
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      solr:
        condition: service_started
    environment:
      CKAN_SQLALCHEMY_URL: postgresql://${DB_USER:-ckan}:${DB_PASSWORD:-changeme-local-only}@db/${DB_NAME:-ckan}
      CKAN_SOLR_URL: http://solr:8983/solr/ckan
      CKAN_REDIS_URL: redis://redis:6379/0
      CKAN_SITE_URL: ${CKAN_SITE_URL:-http://localhost:5000}
      # Активни разширения: envvars (за конфиг през env), dcat + json интерфейс.
      CKAN__PLUGINS: "envvars dcat dcat_json_interface structured_data"
      # DCAT-AP профил за сериализацията (ключът ckanext.dcat.rdf.profiles).
      CKAN___CKANEXT__DCAT__RDF__PROFILES: ${CKAN_DCAT_PROFILE:-euro_dcat_ap_2}
      # Данни за първоначалния sysadmin (само локални заместители).
      CKAN_SYSADMIN_NAME: ${CKAN_SYSADMIN_NAME:-ckan_admin}
      CKAN_SYSADMIN_PASSWORD: ${CKAN_SYSADMIN_PASSWORD:-change-me-local-only}
      CKAN_SYSADMIN_EMAIL: ${CKAN_SYSADMIN_EMAIL:-admin@localhost}
      CKAN_SHARED_DIR: /shared
    volumes:
      # Споделен обем за API токена, издаден при първоначалната подготовка.
      - ckan-shared:/shared
    ports:
      - "5000:5000"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:5000/api/3/action/status_show || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 90s

  api:
    build:
      context: ../api
    environment:
      OHDP_SNAPSHOTS: /snapshots
      OHDP_BASE_URL: ${API_BASE_URL:-http://localhost:8000}
    volumes:
      # Неизменяемите снапшоти от приемната тръба, само за четене.
      - ../ingestion/snapshots:/snapshots:ro
    ports:
      - "8000:8000"

  frontend:
    build:
      context: ../frontend
    environment:
      OHDP_API_BASE: http://api:8000
      OHDP_CKAN_URL: ${CKAN_SITE_URL:-http://localhost:5000}
    depends_on:
      - api
    ports:
      - "3000:3000"

  # Адаптер снапшот → CKAN. Пуска се при поискване, СЛЕД като CKAN е готов и има
  # произведени снапшоти:  docker compose --profile tools run --rm catalog-sync
  catalog-sync:
    image: python:3.12-slim
    profiles: ["tools"]
    depends_on:
      ckan:
        condition: service_healthy
    working_dir: /app
    environment:
      CKAN_URL: http://ckan:5000
      OHDP_API_BASE: ${API_BASE_URL:-http://localhost:8000}
      OHDP_SNAPSHOTS: /snapshots
      CKAN_API_TOKEN_FILE: /shared/ckan_api_token
      CKAN_ORG: ${CKAN_ORG:-midt}
    volumes:
      - ../catalog/sync:/app:ro
      - ../ingestion/snapshots:/snapshots:ro
      - ckan-shared:/shared:ro
    command: ["python", "ckan_sync.py"]

volumes:
  db-data:
  solr-data:
  ckan-shared:
