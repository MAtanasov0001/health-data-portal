# Локална среда за разработка/демо (режим B). НЕ за продукция.
# Вдига: CKAN (вариант А) + неговите зависимости, публичното API и frontend-а.
# Тайните тук са ЗАМЕСТИТЕЛИ за локална употреба — никога не са реални (виж .env.example).

name: ohdp

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${DB_USER:-ckan}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-changeme-local-only}
      POSTGRES_DB: ${DB_NAME:-ckan}
    volumes:
      - db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-ckan}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  solr:
    image: ckan/ckan-solr:2.10-solr9
    volumes:
      - solr-data:/var/solr

  ckan:
    image: ckan/ckan-base:2.10
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      solr:
        condition: service_started
    environment:
      CKAN_SQLALCHEMY_URL: postgresql://${DB_USER:-ckan}:${DB_PASSWORD:-changeme-local-only}@db/${DB_NAME:-ckan}
      CKAN_SOLR_URL: http://solr:8983/solr/ckan
      CKAN_REDIS_URL: redis://redis:6379/0
      CKAN_SITE_URL: ${CKAN_SITE_URL:-http://localhost:5000}
    ports:
      - "5000:5000"

  api:
    build:
      context: ../api
    environment:
      OHDP_SNAPSHOTS: /snapshots
      OHDP_BASE_URL: ${API_BASE_URL:-http://localhost:8000}
    volumes:
      # Неизменяемите снапшоти от приемната тръба, само за четене.
      - ../ingestion/snapshots:/snapshots:ro
    ports:
      - "8000:8000"

  frontend:
    build:
      context: ../frontend
    environment:
      OHDP_API_BASE: http://api:8000
    depends_on:
      - api
    ports:
      - "3000:3000"

volumes:
  db-data:
  solr-data:
