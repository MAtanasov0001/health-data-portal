    Източник: Национална здравноосигурителна каса (НЗОК) — месечни експорти „Справка 5 —
    ПЛС2: разходи и брой болни за противотуморни лекарствени продукти и продукти за вродени
    коагулопатии" (Диагноза България). Метод на приемане: файлово подаване (12 месечни .xls →
    годишен агрегат). Порталът прилага независим контрол на разкриването преди публикуване.
