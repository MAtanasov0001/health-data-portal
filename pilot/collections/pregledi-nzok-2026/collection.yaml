# Колекция (група свързани таблици) — Eurostat-подобен модел: една тема, много таблици.
# Данните са предварително агрегирани публични броеве; не изискват контрол на разкриването.
identifier: pregledi-nzok-2026
title:
  bg: Извършени прегледи (извънболнична помощ, НЗОК), 2026
  en: Outpatient examinations (NHIF), 2026
description:
  bg: >-
    Група таблици с годишни агрегати на извършените прегледи в извънболничната помощ през
    2026 г. — по вид, област, източник на финансиране, причина за посещение, специалност на
    лекаря, първични/вторични, както и топ 15 диагнози (МКБ-10) и топ диагнози при деца.
    Всяка таблица е самостоятелен набор с публично API и интерактивна визуализация.
  en: >-
    A group of tables with annual aggregates of outpatient examinations in 2026 — by type,
    district, financing source, reason for visit, doctor specialization, primary/secondary,
    plus the top 15 diagnoses (ICD-10) and top diagnoses in children. Each table is a
    standalone dataset with a public API and interactive visualization.
publisher: Министерство на иновациите и дигиталната трансформация (МИДТ)
contact_email: data@health.egov.bg
theme: [HEAL]
keyword:
  bg: [прегледи, извънболнична помощ, НЗОК, диагнози, специалности]
  en: [examinations, outpatient care, NHIF, diagnoses, specialties]
